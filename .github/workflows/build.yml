      shell: bash
      run: |
        7z x -aoa mdk-sdk-${TARGET_OS}-x64.7z
        7z x -aoa mdk-sdk-${TARGET_OS}-arm64.7z
        7z a -ssc -m0=lzma2 -mx=9 -ms=on -mf=off mdk-sdk-${TARGET_OS}.7z mdk-sdk
    - name: Archive SDK
      uses: actions/upload-artifact@v7
      with:
        name: mdk-sdk-uwp-RelWithDebInfo
