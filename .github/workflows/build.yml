    - name: Build
      working-directory: mdk
      run: cmake --build --preset=${{ env.TARGET_OS }}-${{ matrix.arch }} --parallel
    - name: Make SDK
      shell: bash
      working-directory: mdk
      run: |
        ../ci-after-build.sh
        mv mdk-sdk-*.7z ../mdk-sdk-${{ env.TARGET_OS }}-${{ matrix.arch }}.7z
    - name: Archive SDK
      uses: actions/upload-artifact@v7
      with:
        name: mdk-sdk-${{ env.TARGET_OS }}-${{ matrix.arch }}-${{ matrix.config }}
        path: mdk-sdk-${{ env.TARGET_OS }}-${{ matrix.arch }}.7z

  UWP_SDK:
    runs-on: ubuntu-latest
    needs: [UWP]
    env:
      TARGET_OS: uwp
    steps:
    - uses: actions/checkout@v6
    - name: Download x64 sdk
      uses: actions/download-artifact@v8
