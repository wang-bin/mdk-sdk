# https://github.blog/changelog/2022-09-08-github-actions-use-github_token-with-workflow_dispatch-and-repository_dispatch/
  Dispatch:
    runs-on: ubuntu-latest
    permissions: write-all
    needs: [abi, NuGet, Apple, Linux_SDK, Android_SDK]
    steps:
#    - name: 'Trigger Workflow'
#      uses: actions/github-script@v7
#      with:
#        script: |
#          await github.rest.actions.createWorkflowDispatch({
#            owner: '${{ github.repository_owner }}',
#            repo: 'mdk-examples',
#            workflow_id: 'workflows/main.yaml',
#            ref: 'master',
#            inputs: {
#              run_id: ${{ github.run_id }}
#            }
#          });
    - name: Dispatch
      if: ${{ env.SF_UPLOAD == 'true' }}
      run: |
        gh workflow run main.yml --repo ${{ github.repository_owner }}/mdk-examples # -f run_id=${{ github.run_id }}
        gh workflow run build.yml --repo ${{ github.repository_owner }}/SPV # -f run_id=${{ github.run_id }}
        gh workflow run main.yml --repo ${{ github.repository_owner }}/mdk-braw -f run_id=${{ github.run_id }}
        gh workflow run main.yml --repo ${{ github.repository_owner }}/mdk-nvjp2k -f run_id=${{ github.run_id }}
      env:
        GH_TOKEN: ${{ secrets.ACTION_PAT }} # GITHUB_TOKEN?

  Pod:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [Apple]
    steps:
    - uses: actions/checkout@v6
    - name: Deploy to Cocoapods
      run: |
        set -eo pipefail
        pod trunk push mdk.podspec --allow-warnings --verbose
      env:
        COCOAPODS_TRUNK_TOKEN: ${{ secrets.POD_TRUNK_TOKEN }}

  Release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [Apple, NuGet, Linux_SDK, Android_SDK, ClangCL_SDK]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download iOS sdk
        uses: actions/download-artifact@v8
        with:
          name: mdk-sdk-iOS
      - name: Download tvOS sdk
        uses: actions/download-artifact@v8
        with:
          name: mdk-sdk-tvOS
      - name: Download visionOS sdk
        uses: actions/download-artifact@v8
        with:
          name: mdk-sdk-visionOS
      - name: Download macCatalyst sdk
        uses: actions/download-artifact@v8
        with:
          name: mdk-sdk-macCatalyst-MinSizeRel
      - name: Download macOS sdk
        uses: actions/download-artifact@v8
        with:
          name: mdk-sdk-macOS
      - name: Download Apple sdk txz
        uses: actions/download-artifact@v8
        with:
          name: mdk-sdk-apple
      - name: Download Apple sdk zip
        uses: actions/download-artifact@v8
        with:
          name: mdk-sdk-apple-zip
      - name: Download win32 vs2026 sdk
        uses: actions/download-artifact@v8
        with:
          name: mdk-sdk-windows-vs2026-RelWithDebInfo
      - name: Download win32 vs2026 ltl sdk
        uses: actions/download-artifact@v8
        with:
          name: mdk-sdk-windows-vs2026-ltl-RelWithDebInfo
      - name: Download uwp sdk
        uses: actions/download-artifact@v8
        with:
          name: mdk-sdk-uwp-RelWithDebInfo
      - name: Download clang-cl sdk
        uses: actions/download-artifact@v8
        with:
          name: mdk-sdk-clang-windows-MinSizeRel
      - name: Download linux sdk
        uses: actions/download-artifact@v8
        with:
          name: mdk-sdk-linux-MinSizeRel
      - name: Download android sdk
        uses: actions/download-artifact@v8
        with:
          name: mdk-sdk-android-MinSizeRel
      - run: ls -lh
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body: "Changelog.md"
          #body_path: Changelog.md
          files: |
            *.7z
            *.xz
            mdk-sdk-apple.zip
