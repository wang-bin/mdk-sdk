  NuGet:
    runs-on: macos-latest
    needs: [Windows_SDK, UWP_SDK]
    steps:
    - uses: actions/checkout@v6
    - name: Download windows vs2026 sdk
      uses: actions/download-artifact@v8
      with:
        name: mdk-sdk-windows-vs2026-RelWithDebInfo
    - name: Download windows x64 vs2026 sdk
      uses: actions/download-artifact@v8
      with:
        name: mdk-sdk-windows-x64-vs2026-RelWithDebInfo
    - name: Download uwp sdk
      uses: actions/download-artifact@v8
      with:
        name: mdk-sdk-uwp-RelWithDebInfo
    - name: update build version
      shell: bash
      run: sed -i .bak "s,\(.*\.\)[0-9]*\(</version>\),\1${GITHUB_RUN_NUMBER}\2," nuget/mdk.nuspec
    - name: install tools
      run: brew install sshpass nuget 7zip md5sha1sum
    - name: Make nupkg (vs2026)
      run: |
        rm -rf mdk-sdk uwp
        md5sum mdk-sdk-windows-vs2026.7z | cut -d ' ' -f1 > mdk-sdk-windows-vs2026.7z.md5
        md5sum mdk-sdk-windows-x64-vs2026.7z | cut -d ' ' -f1 > mdk-sdk-windows-x64-vs2026.7z.md5
        7z x mdk-sdk-windows-vs2026.7z
        7z x mdk-sdk-uwp.7z -o"uwp"
        mkdir mdk-sdk/bin/UAP
        cp -af uwp/mdk-sdk/bin/* mdk-sdk/bin/UAP
        cp nuget/mdk.nuspec mdk-sdk
        cp -avf nuget/README.md mdk-sdk
        cd mdk-sdk
        nuget pack mdk.nuspec
        mv *.nupkg ../mdk-vs2026.nupkg
    - name: Archive SDK
      uses: actions/upload-artifact@v7
      with:
        name: mdk-nuget
        path: 'mdk*.nupkg'
    - name: Upload to SourceForge
      if: ${{ env.SF_UPLOAD == 'true' }}
      shell: bash
      run: make -f upload.mk

